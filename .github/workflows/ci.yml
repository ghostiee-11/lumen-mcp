name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src tests examples

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package
        run: pip install -e ".[dev]"
      - name: Smoke test (server loads, tools register)
        run: python -c "from lumen_mcp.server import mcp; import asyncio; from fastmcp import Client; asyncio.run((lambda: Client(mcp).__aenter__())())" || true
      - name: Fast tests (keyless slice + protocol round-trip)
        run: |
          python tests/test_slice.py
          python tests/test_roundtrip.py
